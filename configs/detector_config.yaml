      data_yaml: "./dataset/mechanical_tools/data.yaml"
      nc: 5
      names: ["drill", "hammer", "pliers", "screwdriver", "wrench"]
    hyperparameters:
      {lr: 0.01, lrf: 0.01, momentum: 0.937, weight_decay: 0.0005,
       warmup_epochs: 3.0, warmup_momentum: 0.8, warmup_bias_lr: 0.1,
       box: 0.05, cls: 0.5, cls_pw: 1.0, obj: 1.0, obj_pw: 1.0,
       iou_t: 0.20, anchor_t: 4.0, fl_gamma: 0.0,
       hsv_h: 0.015, hsv_s: 0.7, hsv_v: 0.4, degrees: 0.0,
       translate: 0.1, scale: 0.5, shear: 0.0, perspective: 0.0,
       flipud: 0.0, fliplr: 0.5, mosaic: 1.0, mixup: 0.0, copy_paste: 0.0}
    training:
      {epochs: 5, batch: 4, workers: 2, device: "mps", seed: 42,
       early_stopping: {patience: 10, enabled: true},
       resume: false, pretrained: true, amp: true, deterministic: true,
       single_cls: false, image_weights: false, multi_scale: false,
       save_period: -1, exist_ok: false, project: "runs", name: "mech_yolov5_nano",
       optimizer: "AdamW", cos_lr: false, label_smoothing: 0.0, freeze: 22, cache: false}
    inference:
      {imgsz: [416, 416], conf_thres: 0.25, iou_thres: 0.45,
       max_det: 300, half: false, augment: false, visualize: false}
